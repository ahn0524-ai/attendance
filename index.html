<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>낯선대학 9기 출석 체크</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --accent: #7c6cfa;
    --accent2: #fa6c8c;
    --green: #4ade80;
    --green-dim: #1a3a28;
    --text: #f0f0f8;
    --text-muted: #7070a0;
    --text-dim: #4a4a6a;
    --radius: 20px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  header {
    display: flex; align-items: center;
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0; gap: 14px;
  }
  .header-brand { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .brand-logo {
    width: 44px; height: 44px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), #9c8cfc);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .brand-text { display: flex; flex-direction: column; gap: 2px; }
  .community-name { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
  .date-display { font-size: 12px; color: var(--text-muted); }
  .session-badge {
    margin-left: auto; padding: 6px 14px;
    background: rgba(124, 108, 250, 0.15);
    color: var(--accent); border-radius: 20px;
    font-size: 13px; font-weight: 600;
  }
  .stats-bar {
    display: flex; align-items: center;
    padding: 14px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    gap: 20px; flex-shrink: 0;
  }
  .stat-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-muted); }
  .stat-dot { width: 8px; height: 8px; border-radius: 50%; }
  .stat-dot.present { background: var(--green); }
  .stat-dot.total { background: var(--accent); }
  .stat-value { color: var(--text); font-weight: 700; font-size: 15px; }
  .progress-wrap { flex: 1; margin-left: auto; max-width: 280px; }
  .progress-track { width: 100%; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 3px; transition: width 0.4s ease; width: 0%; }
  .progress-percent { font-size: 11px; color: var(--text-muted); margin-top: 4px; text-align: right; }
  .list-wrap { flex: 1; overflow-y: auto; padding: 16px 20px 120px; -webkit-overflow-scrolling: touch; }
  .group-header {
    font-size: 13px; color: var(--text-muted);
    font-weight: 600; padding: 12px 8px 6px;
    position: sticky; top: 0; background: var(--bg); z-index: 5;
  }
  .member-card {
    display: flex; align-items: center;
    padding: 14px 18px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 14px;
    margin-bottom: 8px; cursor: pointer;
    transition: all 0.18s ease;
  }
  .member-card:active { transform: scale(0.98); }
  .member-card.present { background: var(--green-dim); border-color: var(--green); }
  .member-name { font-size: 16px; font-weight: 500; flex: 1; }
  .member-card.present .member-name { color: var(--green); font-weight: 600; }
  .attendance-badge {
    padding: 4px 10px; background: var(--surface2);
    color: var(--text-muted); border-radius: 12px;
    font-size: 12px; margin-right: 12px;
  }
  .check-icon {
    width: 26px; height: 26px; border-radius: 50%;
    border: 2px solid var(--text-dim);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s ease; flex-shrink: 0;
  }
  .member-card.present .check-icon { background: var(--green); border-color: var(--green); }
  .check-icon svg { width: 14px; height: 14px; opacity: 0; }
  .member-card.present .check-icon svg { opacity: 1; }
  .sync-bar {
    position: fixed; left: 0; right: 0; bottom: 0;
    padding: 12px 20px 20px;
    background: linear-gradient(180deg, transparent, var(--bg) 20%);
    display: flex; flex-direction: column; gap: 8px; z-index: 10;
  }
  .sync-btn {
    width: 100%; padding: 14px; background: var(--accent);
    color: white; border: none; border-radius: 14px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: all 0.18s ease;
  }
  .sync-btn:active:not(:disabled) { transform: scale(0.98); }
  .sync-btn:disabled { opacity: 0.6; cursor: wait; }
  .status-text { font-size: 12px; color: var(--text-muted); text-align: center; }
  .popup-toast {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 28px 40px; text-align: center;
    z-index: 100; opacity: 0; pointer-events: none;
    transition: all 0.25s ease; min-width: 200px;
  }
  .popup-toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  .popup-name { font-size: 18px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
  .popup-count { font-size: 15px; color: var(--accent); font-weight: 600; margin-bottom: 4px; }
  .popup-label { font-size: 13px; color: var(--text-muted); }
</style>
</head>
